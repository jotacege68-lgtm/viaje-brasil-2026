<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brasil 2026 - Control de Gastos</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #f8fafc; --header-h: 70px; --accent: #16a34a; --pareja-bg: #fdf2f8; --pareja-accent: #db2777; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-top: calc(var(--header-h) + 20px); color: #334155; }
        
        .tabs { position: fixed; top: 0; width: 100%; background: #0f172a; display: flex; height: var(--header-h); box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; }
        .tab-btn { flex: 1; border: none; background: none; font-size: 14px; font-weight: 900; color: #94a3b8; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; transition: 0.2s;}
        .tab-btn.active { color: #fbbf24; background: #1e293b; border-bottom: 5px solid #fbbf24; }
        .tab-btn-pareja { color: #fbcfe8; }
        .tab-btn-pareja.active { color: #f472b6; border-bottom-color: #f472b6; }
        
        .container { padding: 15px; display: none; max-width: 600px; margin: auto; }
        .container.active { display: block; }

        .card { background: white; padding: 25px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .card-pareja { background: var(--pareja-bg); border-color: #fbcfe8; }
        h2 { font-size: 22px; font-weight: 900; margin-top: 0; color: #1e293b; text-transform: uppercase; border-bottom: 4px solid #fbbf24; display: inline-block; margin-bottom: 20px; }
        h2.titulo-pareja { color: var(--pareja-accent); border-color: var(--pareja-accent); }
        
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 800; color: #475569; text-transform: uppercase; }
        select, input { width: 100%; padding: 16px; margin-bottom: 15px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 18px; box-sizing: border-box; color: #000; background: #fff;}
        
        .btn-save { background: var(--accent); color: white; padding: 20px; border: none; border-radius: 15px; font-weight: 900; font-size: 20px; cursor: pointer; width: 100%; box-shadow: 0 5px 0 #15803d; transition: 0.1s;}
        .btn-save:active { transform: translateY(5px); box-shadow: none; }
        .btn-excel { background: #2563eb; box-shadow: 0 5px 0 #1e40af; margin-bottom: 20px;}
        .btn-save-pareja { background: var(--pareja-accent); box-shadow: 0 5px 0 #9f1239; }
        
        .seccion-titulo { background: #334155; color: white; padding: 12px 15px; border-radius: 10px; font-size: 16px; font-weight: 800; margin: 25px 0 15px 0; text-align: center; }
        .historial-item { padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; font-size: 16px; }

        .reporte-tabla { width: 100%; border-collapse: collapse; font-size: 14px; }
        .reporte-tabla th { text-align: left; padding: 10px; border-bottom: 2px solid #e2e8f0; color: #64748b; font-size: 12px; }
        .reporte-tabla td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }
        
        .balance-card { text-align: center; padding: 25px; background: #1e293b; color: white; border-radius: 20px; margin-bottom: 20px; }
        .parejas-arriba { display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 20px; font-weight: 900; color: #fbbf24; }
        .parejas-arriba small { font-size: 12px; color: #94a3b8; display: block; text-transform: uppercase; }
        .monto-abajo { font-size: 36px; font-weight: 900; border-top: 1px solid #475569; padding-top: 15px; }

        .resultado-final { padding: 20px; border-radius: 15px; font-weight: 900; text-align: center; font-size: 18px; border: 3px solid transparent; margin-bottom: 10px; }
        .gana-p1 { background: #dbeafe; color: #1e40af; border-color: #3b82f6; }
        .gana-p2 { background: #ffe4e6; color: #9f1239; border-color: #f43f5e; }

        .liquidador-box { background: #fdf2f8; border: 2px solid #f472b6; border-radius: 20px; padding: 20px; margin-top: 20px; }
        .input-cambio { background: #fff; border: 2px solid #cbd5e1; font-weight: bold; text-align: center; font-size: 20px; color: #be185d;}
        
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; display: inline-block; margin-bottom:5px;}
        .badge-mitad { background: #8b5cf6; }
        .badge-juan { background: #2563eb; }
        .badge-tania { background: #db2777; }
        .resumen-saldo-pareja { font-size: 20px; font-weight: 900; margin: 15px 0; padding: 15px; border-radius: 10px; border: 2px dashed; text-align: center;}
        .debe-juan { color: #be185d; border-color: #f472b6; background: #fdf2f8; }
        .debe-tania { color: #1d4ed8; border-color: #3b82f6; background: #eff6ff; }
        .empate { color: #475569; border-color: #cbd5e1; background: #f1f5f9; }
    </style>
</head>
<body>

<nav class="tabs">
    <button class="tab-btn active" onclick="showTab('CARGAR_GRUPO', this)">GASTOS</button>
    <button class="tab-btn" onclick="showTab('HISTORIAL_GRUPO', this)">HISTORICO</button>
    <button class="tab-btn" onclick="showTab('BALANCE_GRUPO', this)">BALANCE</button>
    <button class="tab-btn tab-btn-pareja" onclick="showTab('PAREJA_INTERNO', this)">JyT</button>
</nav>

<!-- 1. GASTOS -->
<div id="CARGAR_GRUPO" class="container active">
    <h2>NUEVO GASTO GRUPAL</h2>
    <div class="card">
        <label>¿Quién Pagó?</label>
        <select id="pagador">
            <optgroup label="Pareja 1">
                <option value="JUAN">Juan</option>
                <option value="TANIA">Tania</option>
            </optgroup>
            <optgroup label="Pareja 2">
                <option value="ROSARIO">Rosario</option>
                <option value="RICHARD">Richard</option>
            </optgroup>
        </select>
        <label>Moneda</label>
        <select id="moneda">
            <option value="REALES">REALES (R$)</option>
            <option value="PESOS">PESOS ($)</option>
        </select>
        <label>Monto</label>
        <input type="number" id="monto" inputmode="decimal" placeholder="0.00">
        <label>Rubro</label>
        <select id="rubro" onchange="checkOtro(this)">
            <option value="COMIDA FUERA">Comida fuera</option>
            <option value="SUPER">Super</option>
            <option value="BEBIDAS">Bebidas</option>
            <option value="ALOJAMIENTO">Alojamiento</option>
            <option value="NAFTA">Nafta</option>
            <option value="PEAJES">Peajes</option>
            <option value="VARIOS">Varios (Otro)</option>
        </select>
        <input type="text" id="rubro-otro" placeholder="¿Qué gasto fue?" style="display:none; margin-top: 10px;">
        <button class="btn-save" onclick="guardarGasto()">💾 GUARDAR GASTO</button>
    </div>
</div>

<!-- 2. HISTORICO -->
<div id="HISTORIAL_GRUPO" class="container">
    <h2>HISTORICO GRUPAL</h2>
    <button class="btn-save btn-excel" onclick="exportarExcel()">📊 DESCARGAR EXCEL</button>
    
    <div class="card" style="padding:15px">
        <label style="font-size:14px; color:#1e293b">RESUMEN POR RUBRO</label>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; background:#f1f5f9; padding:10px; border-radius:10px;">
            <small style="font-weight:bold; font-size:11px;">TIPO CAMBIO:</small>
            <input type="number" id="tc-reporte" placeholder="Ej: 8.5" style="margin:0; padding:8px; font-size:16px;" oninput="generarReporteRubros()">
        </div>
        <table class="reporte-tabla" id="tabla-rubros">
            <thead>
                <tr><th>RUBRO</th><th>REALES</th><th>PESOS</th><th>TOTAL ($)</th></tr>
            </thead>
            <tbody id="body-reporte"></tbody>
        </table>
    </div>
    <div id="listas-por-moneda"></div>
</div>

<!-- 3. BALANCE -->
<div id="BALANCE_GRUPO" class="container">
    <h2>BALANCE GRUPAL</h2>
    <div class="card" style="background: #f1f5f9; padding: 15px;">
        <label>MONEDA DEL DETALLE:</label>
        <select id="moneda-balance" onchange="calcularBalanceGrupo()" style="margin-bottom:0">
            <option value="REALES">REALES (R$)</option>
            <option value="PESOS">PESOS ($)</option>
        </select>
    </div>
    <div class="card">
        <label>Bolsillo individual:</label>
        <div id="detalle-individual" style="font-size: 16px;"></div>
    </div>
    <div class="balance-card">
        <div class="parejas-arriba">
            <div><small>Pareja 1 (J+T)</small><span id="total-p1">0</span></div>
            <div><small>Pareja 2 (R+R)</small><span id="total-p2">0</span></div>
        </div>
        <div class="monto-abajo"><div id="total-viaje">0</div></div>
    </div>
    <div id="veredicto" class="resultado-final"></div>
    <div class="liquidador-box">
        <h3 style="margin-top:0; color:#be185d; text-align:center; font-size:18px;">💰 CIERRE EN PESOS</h3>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <label style="margin:0">COTIZACIÓN REAL:</label>
            <input type="number" id="tc-real-grupo" class="input-cambio" placeholder="0.00" style="width:130px; margin:0;" oninput="liquidarPesosGrupo()">
        </div>
        <div id="detalles-conversion" style="font-size:14px; border-top:1px dashed #f472b6; padding-top:10px; margin-bottom:15px; text-align:center;"></div>
        <div id="veredicto-final-pesos" class="resultado-final" style="background:#fff; border-color:#be185d; color:#be185d; font-size:20px;">Ingresa cotización...</div>
    </div>
</div>

<!-- 4. JyT -->
<div id="PAREJA_INTERNO" class="container">
    <h2 class="titulo-pareja">CUENTAS J & T</h2>
    <div class="card card-pareja">
        <label>¿Quién pagó?</label>
        <select id="pagador-pareja" style="border-color: #f472b6;">
            <option value="JUAN">Juan</option>
            <option value="TANIA">Tania</option>
        </select>
        <label>¿A quién correspondía?</label>
        <select id="beneficiario-pareja" style="background-color: #fffbe8; border-color: #fbbf24;">
            <option value="AMBOS">A medias (Ej: Cena solos)</option>
            <option value="JUAN">Solo Juan (Ej: Su ropa)</option>
            <option value="TANIA">Solo Tania (Ej: Su ropa)</option>
        </select>
        <label>Moneda / Monto</label>
        <div style="display:flex; gap:10px;">
            <select id="moneda-pareja" style="flex:1">
                <option value="REALES">REALES</option>
                <option value="PESOS">PESOS</option>
            </select>
            <input type="number" id="monto-pareja" style="flex:2" inputmode="decimal" placeholder="0.00">
        </div>
        <label>¿Qué fue?</label>
        <input type="text" id="detalle-pareja" placeholder="Ej: Protector solar">
        <button class="btn-save btn-save-pareja" onclick="guardarGastoPareja()">💾 GUARDAR J&T</button>
    </div>

    <div class="card card-pareja">
        <label style="color: #9f1239; text-align: center; margin-bottom: 10px;">BALANCE UNIFICADO J&T:</label>
        <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 15px;">
            <span style="font-size: 13px; font-weight: bold;">Real Hoy:</span>
            <input type="number" id="tc-pareja" placeholder="8.50" style="width: 100px; margin: 0; padding: 10px; text-align: center; border-color:#db2777;" oninput="liquidarParejaUnificado()">
        </div>
        <div id="veredicto-pareja" class="resumen-saldo-pareja empate">Cotización...</div>
        <div id="desglose-pareja" style="font-size: 11px; margin-top: 15px;"></div>
        <hr style="border-top:1px dashed #fbcfe8; margin: 20px 0;">
        <div id="lista-pareja"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBDlHjKXf33pCEznyLAmFrTDXVPevrHe9Q",
      authDomain: "gastoscasa-d8bc2.firebaseapp.com",
      databaseURL: "https://gastoscasa-d8bc2-default-rtdb.firebaseio.com",
      projectId: "gastoscasa-d8bc2",
      storageBucket: "gastoscasa-d8bc2.firebasestorage.app",
      messagingSenderId: "749635992986",
      appId: "1:749635992986:web:7916d888f54eb5c3ab0e23"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const NODO_GRUPO = 'viaje_brasil_2026'; // Base original con historial
    const NODO_PAREJA = 'brasil_2026_interno';

    let todosLosGastosGrupo = [];
    let sumasGlobales = { P1: { REALES: 0, PESOS: 0 }, P2: { REALES: 0, PESOS: 0 } };

    function showTab(id, btn) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'HISTORIAL_GRUPO') cargarHistorialGrupo();
        if(id === 'BALANCE_GRUPO') calcularBalanceGrupo();
        if(id === 'PAREJA_INTERNO') cargarPantallaPareja();
        window.scrollTo(0,0);
    }

    function checkOtro(s) { document.getElementById('rubro-otro').style.display = s.value === 'VARIOS' ? 'block' : 'none'; }

    function guardarGasto() {
        const pagador = document.getElementById('pagador').value;
        const moneda = document.getElementById('moneda').value;
        const monto = parseFloat(document.getElementById('monto').value);
        let rubro = document.getElementById('rubro').value;
        if(rubro === 'VARIOS' && document.getElementById('rubro-otro').value !== "") rubro = "VAR: " + document.getElementById('rubro-otro').value;
        if (!monto || monto <= 0) return alert("Monto inválido");
        db.ref(NODO_GRUPO).push({
            pagador, moneda, monto, rubro, timestamp: firebase.database.ServerValue.TIMESTAMP,
            fecha: new Date().toLocaleDateString('es-UY')
        }).then(() => { alert("✅ Guardado"); document.getElementById('monto').value = ""; });
    }

    function cargarHistorialGrupo() {
        db.ref(NODO_GRUPO).once('value', s => {
            const gastos = { REALES: [], PESOS: [] };
            todosLosGastosGrupo = [];
            s.forEach(c => {
                const g = c.val(); g.id = c.key;
                todosLosGastosGrupo.push(g);
                if(gastos[g.moneda]) gastos[g.moneda].push(g);
            });
            generarReporteRubros();
            let html = "";
            ["REALES", "PESOS"].forEach(m => {
                if(gastos[m].length > 0) {
                    html += `<div class="seccion-titulo">GASTOS EN ${m}</div>`;
                    gastos[m].reverse().forEach(g => {
                        html += `<div class="card historial-item">
                            <div><small>${g.fecha}</small><br><b style="font-size:16px">${g.rubro}</b><br><small>Pagó: ${g.pagador}</small></div>
                            <div style="text-align:right"><b>${m === 'REALES' ? 'R$' : '$'} ${g.monto}</b><br>
                            <button onclick="borrarGrupo('${g.id}')" style="color:#e11d48; border:none; background:none; font-size:11px; text-decoration:underline;">BORRAR</button></div>
                        </div>`;
                    });
                }
            });
            document.getElementById('listas-por-moneda').innerHTML = html || "<p style='text-align:center'>Vacío.</p>";
        });
    }

    function generarReporteRubros() {
        const tc = parseFloat(document.getElementById('tc-reporte').value) || 0;
        const rubrosData = {};
        todosLosGastosGrupo.forEach(g => {
            let r = g.rubro; if(r.startsWith("VAR:")) r = "VARIOS";
            if(!rubrosData[r]) rubrosData[r] = { REALES: 0, PESOS: 0 };
            rubrosData[r][g.moneda] += g.monto;
        });
        let html = "";
        for(const r in rubrosData) {
            const tot = rubrosData[r].PESOS + (rubrosData[r].REALES * tc);
            html += `<tr><td style="font-weight:bold">${r}</td><td>R$ ${rubrosData[r].REALES.toLocaleString()}</td><td>$ ${rubrosData[r].PESOS.toLocaleString()}</td><td>${tc > 0 ? '$ ' + tot.toLocaleString() : '-'}</td></tr>`;
        }
        document.getElementById('body-reporte').innerHTML = html;
    }

    function exportarExcel() {
        if (todosLosGastosGrupo.length === 0) return alert("Nada para exportar");
        let csv = "\uFEFFFECHA;PAGADOR;RUBRO;MONEDA;MONTO\n";
        todosLosGastosGrupo.forEach(g => {
            csv += `${g.fecha};${g.pagador};${g.rubro.replace(/;/g, ",")};${g.moneda};${g.monto.toLocaleString('es-UY', {useGrouping:false})}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Rendicion_Gastos_Brasil.csv";
        link.click();
    }

    function borrarGrupo(id) { if(confirm("¿Borrar?")) db.ref(`${NODO_GRUPO}/${id}`).remove().then(()=>cargarHistorialGrupo()); }

    function calcularBalanceGrupo() {
        const monSel = document.getElementById('moneda-balance').value;
        db.ref(NODO_GRUPO).once('value', s => {
            sumasGlobales = { P1: { REALES: 0, PESOS: 0 }, P2: { REALES: 0, PESOS: 0 } };
            let ind = {JUAN:0, TANIA:0, ROSARIO:0, RICHARD:0};
            s.forEach(c => {
                const g = c.val();
                const pareja = ["JUAN", "TANIA"].includes(g.pagador) ? 'P1' : 'P2';
                sumasGlobales[pareja][g.moneda] += g.monto;
                if(g.moneda === monSel) ind[g.pagador] += g.monto;
            });
            const tP1 = sumasGlobales.P1[monSel], tP2 = sumasGlobales.P2[monSel], total = tP1 + tP2, dif = tP1 - (total/2), sim = (monSel === 'REALES' ? 'R$' : '$');
            document.getElementById('total-viaje').innerText = `${sim} ${total.toLocaleString()}`;
            document.getElementById('total-p1').innerText = `${sim} ${tP1.toLocaleString()}`;
            document.getElementById('total-p2').innerText = `${sim} ${tP2.toLocaleString()}`;
            const v = document.getElementById('veredicto');
            v.className = "resultado-final " + (dif > 0 ? "gana-p1" : "gana-p2");
            v.innerHTML = dif > 0 ? `P2 ADEUDA A P1<br><b>${sim} ${Math.abs(dif).toLocaleString()}</b>` : `P1 ADEUDA A P2<br><b>${sim} ${Math.abs(dif).toLocaleString()}</b>`;
            let h = ""; for(let p in ind) h += `<div style="display:flex; justify-content:space-between"><span>${p}:</span><b>${sim} ${ind[p].toLocaleString()}</b></div>`;
            document.getElementById('detalle-individual').innerHTML = h;
            liquidarPesosGrupo();
        });
    }

    function liquidarPesosGrupo() {
        const tc = parseFloat(document.getElementById('tc-real-grupo').value);
        if(isNaN(tc)) return;
        const p1T = sumasGlobales.P1.PESOS + (sumasGlobales.P1.REALES * tc), p2T = sumasGlobales.P2.PESOS + (sumasGlobales.P2.REALES * tc);
        const total = p1T + p2T, dif = p1T - (total/2);
        document.getElementById('detalles-conversion').innerHTML = `P1: $${p1T.toLocaleString()} | P2: $${p2T.toLocaleString()}`;
        document.getElementById('veredicto-final-pesos').innerHTML = dif > 0 ? `DEUDA FINAL: P2 DEBE A P1<br><b>$ ${Math.abs(dif).toLocaleString()}</b>` : `DEUDA FINAL: P1 DEBE A P2<br><b>$ ${Math.abs(dif).toLocaleString()}</b>`;
    }

    function guardarGastoPareja() {
        const pag = document.getElementById('pagador-pareja').value, ben = document.getElementById('beneficiario-pareja').value;
        const mon = document.getElementById('moneda-pareja').value, monP = parseFloat(document.getElementById('monto-pareja').value);
        let det = document.getElementById('detalle-pareja').value.trim();
        if(!monP || monP <= 0) return alert("Monto!");
        db.ref(NODO_PAREJA).push({ pagador: pag, beneficiario: ben, moneda: mon, monto: monP, detalle: det || "Gasto J&T", timestamp: firebase.database.ServerValue.TIMESTAMP, fecha: new Date().toLocaleDateString('es-UY') }).then(()=> { alert("Guardado"); document.getElementById('monto-pareja').value=""; cargarPantallaPareja(); });
    }

    function cargarPantallaPareja() {
        db.ref(NODO_PAREJA).orderByChild('timestamp').once('value', s => {
            let h = ""; s.forEach(c => {
                const g = c.val(); const bCls = g.beneficiario === 'AMBOS' ? 'badge-mitad' : (g.beneficiario === 'JUAN' ? 'badge-juan' : 'badge-tania');
                h = `<div style="font-size:13px; padding:10px; border-bottom:1px solid #fbcfe8; background:#fff; margin-bottom:5px; border-radius:10px; display:flex; justify-content:space-between"><div><span class="badge ${bCls}">${g.beneficiario}</span><br><b>${g.detalle}</b><br><small>${g.pagador}</small></div><div style="text-align:right"><b>${g.moneda === 'REALES' ? 'R$' : '$'} ${g.monto}</b><br><button onclick="borrarPareja('${c.key}')" style="color:red; border:none; background:none; font-size:10px">Borrar</button></div></div>` + h;
            });
            document.getElementById('lista-pareja').innerHTML = h;
            liquidarParejaUnificado();
        });
    }

    function borrarPareja(id) { if(confirm("¿Borrar?")) db.ref(`${NODO_PAREJA}/${id}`).remove().then(()=>cargarPantallaPareja()); }

    function liquidarParejaUnificado() {
        const tc = parseFloat(document.getElementById('tc-pareja').value);
        if(isNaN(tc)) return;
        Promise.all([db.ref(NODO_GRUPO).once('value'), db.ref(NODO_PAREJA).once('value')]).then(snaps => {
            let jPagGrupo = 0, tPagGrupo = 0;
            snaps[0].forEach(c => {
                const g = c.val(); const mP = g.moneda === 'REALES' ? (g.monto * tc) : g.monto;
                if(g.pagador === 'JUAN') jPagGrupo += mP; if(g.pagador === 'TANIA') tPagGrupo += mP;
            });
            const p1TotalGrupo = jPagGrupo + tPagGrupo; const jDebeGrupo = jPagGrupo - (p1TotalGrupo / 2);
            let jDebePareja = 0; snaps[1].forEach(c => {
                const g = c.val(); const mP = g.moneda === 'REALES' ? (g.monto * tc) : g.monto;
                if(g.pagador === 'JUAN') { if(g.beneficiario === 'AMBOS') jDebePareja -= (mP/2); if(g.beneficiario === 'TANIA') jDebePareja -= mP; }
                else { if(g.beneficiario === 'AMBOS') jDebePareja += (mO/2); if(g.beneficiario === 'JUAN') jDebePareja += mP; }
            });
            const final = jDebeGrupo - jDebePareja; // Simplificación Splitwise
            const v = document.getElementById('veredicto-pareja');
            if(final > 0) { v.className = "resumen-saldo-pareja debe-tania"; v.innerHTML = `TANIA DEBE A JUAN<br><b>$ ${Math.abs(final).toLocaleString({maximumFractionDigits:0})}</b>`; }
            else { v.className = "resumen-saldo-pareja debe-juan"; v.innerHTML = `JUAN DEBE A TANIA<br><b>$ ${Math.abs(final).toLocaleString({maximumFractionDigits:0})}</b>`; }
            document.getElementById('desglose-pareja').innerHTML = `* Juan tiene a favor del grupo: $${jDebeGrupo.toLocaleString()}<br>* Por caja chica J&T: $${(-jDebePareja).toLocaleString()}`;
        });
    }
</script>
