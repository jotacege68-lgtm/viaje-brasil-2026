
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brasil 2026 - Rendición</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-active { color: #fbbf24; background: #1e293b; border-bottom: 4px solid #fbbf24; }
        .tab-jyt-active { color: #f472b6; background: #4c1d95; border-bottom: 4px solid #f472b6; }
    </style>
</head>
<body class="bg-slate-50 pb-20">

    <!-- Navegación Superior -->
    <nav class="fixed top-0 w-full h-[70px] bg-slate-900 flex shadow-2xl z-50">
        <button onclick="changeTab('GASTOS')" id="btn-GASTOS" class="flex-1 text-[12px] font-black uppercase text-slate-400 transition-all">Gastos</button>
        <button onclick="changeTab('HISTORIAL')" id="btn-HISTORIAL" class="flex-1 text-[12px] font-black uppercase text-slate-400 transition-all">Historico</button>
        <button onclick="changeTab('BALANCE')" id="btn-BALANCE" class="flex-1 text-[12px] font-black uppercase text-slate-400 transition-all">Balance</button>
        <button onclick="changeTab('PAREJA')" id="btn-PAREJA" class="flex-1 text-[12px] font-black uppercase text-slate-400 border-l border-slate-800 transition-all">JyT</button>
    </nav>

    <div class="pt-[90px] px-4 max-w-lg mx-auto">
        
        <!-- SECCIÓN GASTOS -->
        <div id="sec-GASTOS" class="tab-content">
            <h2 class="text-xl font-black mb-6 border-b-4 border-amber-400 inline-block uppercase text-slate-800">Cargar Gasto Grupo</h2>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Quién Pagó</label>
                <select id="g-pagador" class="w-full p-4 mb-4 bg-slate-50 rounded-2xl text-lg outline-none border-none">
                    <option value="JUAN">Juan</option><option value="TANIA">Tania</option>
                    <option value="RICHARD">Richard</option><option value="ROSARIO">Rosario</option>
                </select>

                <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Moneda</label>
                <select id="g-moneda" class="w-full p-4 mb-4 bg-slate-50 rounded-2xl text-lg outline-none border-none">
                    <option value="REALES">REALES (R$)</option><option value="PESOS">PESOS ($)</option>
                </select>

                <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Monto</label>
                <input type="number" id="g-monto" class="w-full p-4 mb-4 bg-slate-50 rounded-2xl text-lg outline-none border-none" placeholder="0,00" inputmode="decimal">

                <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Rubro</label>
                <select id="g-rubro" class="w-full p-4 mb-4 bg-slate-50 rounded-2xl text-lg outline-none border-none" onchange="checkOtro(this.value)">
                    <option value="NAFTA">Nafta</option><option value="PEAJES">Peajes</option>
                    <option value="SUPER">Super</option><option value="COMIDA FUERA">Comida Fuera</option>
                    <option value="ALOJAMIENTO">Alojamiento</option><option value="BEBIDAS">Bebidas</option>
                    <option value="VARIOS">Otro</option>
                </select>
                <input type="text" id="g-otro" class="hidden w-full p-4 mb-4 border-2 border-amber-100 rounded-2xl" placeholder="¿Qué gasto fue?">

                <button onclick="saveGrupo()" class="w-full bg-emerald-600 text-white p-5 rounded-2xl font-black text-xl shadow-[0_6px_0_#059669] active:translate-y-1 active:shadow-none transition-all">GUARDAR GASTO</button>
            </div>
        </div>

        <!-- SECCIÓN HISTORICO -->
        <div id="sec-HISTORIAL" class="tab-content hidden">
            <h2 class="text-xl font-black mb-6 border-b-4 border-amber-400 inline-block uppercase text-slate-800">Histórico Grupal</h2>
            <button onclick="exportarExcelTotal()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black mb-6 shadow-[0_6px_0_#1d4ed8] flex items-center justify-center gap-2">
                📊 DESCARGAR EXCEL RENDICIÓN
            </button>
            
            <div id="resumen-container" class="bg-white p-5 rounded-3xl border border-slate-200 mb-6 text-sm overflow-hidden shadow-sm">
                <div class="flex items-center gap-2 mb-4">
                    <span class="font-bold text-slate-400 uppercase text-[10px]">TC Reporte:</span>
                    <input type="number" id="tc-historial" value="8.5" oninput="renderHistorial()" class="w-16 p-1 border rounded text-center font-bold">
                </div>
                <div id="tabla-resumen"></div>
            </div>

            <div id="lista-gastos" class="space-y-3"></div>
        </div>

        <!-- SECCIÓN BALANCE -->
        <div id="sec-BALANCE" class="tab-content hidden text-center">
            <h2 class="text-xl font-black mb-6 border-b-4 border-amber-400 inline-block uppercase text-slate-800">Balance Grupo de 4</h2>
            <div class="bg-white p-4 rounded-2xl border mb-6">
                <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Moneda del Balance</label>
                <select id="bal-moneda-sel" onchange="renderBalance()" class="w-full p-3 bg-slate-50 rounded-xl font-bold outline-none">
                    <option value="REALES">REALES (R$)</option><option value="PESOS">PESOS ($)</option>
                </select>
            </div>
            
            <div class="bg-slate-900 text-white p-8 rounded-[3rem] mb-6 shadow-2xl relative overflow-hidden">
                <div class="flex justify-around mb-6">
                    <div class="text-amber-400"><small class="block text-slate-500 font-bold uppercase text-[10px]">P1 (J+T)</small><p id="sum-p1" class="text-xl font-black"></p></div>
                    <div class="text-amber-400"><small class="block text-slate-500 font-bold uppercase text-[10px]">P2 (R+R)</small><p id="sum-p2" class="text-xl font-black"></p></div>
                </div>
                <div id="sum-total" class="text-5xl font-black border-t border-slate-800 pt-6"></div>
            </div>

            <div id="veredicto-caja" class="p-6 rounded-3xl border-2 font-black text-lg"></div>
        </div>

        <!-- SECCIÓN JyT -->
        <div id="sec-PAREJA" class="tab-content hidden">
            <h2 class="text-xl font-black mb-6 border-b-4 border-pink-500 text-pink-600 inline-block uppercase">Cuentas J & T</h2>
            <div class="bg-pink-50 p-6 rounded-[2.5rem] border border-pink-100 mb-8">
                <label class="text-[10px] font-black text-pink-400 uppercase mb-1 block">Quién Pagó</label>
                <select id="p-pagador" class="w-full p-4 mb-4 rounded-xl text-lg outline-none border-none">
                    <option value="JUAN">Juan</option><option value="TANIA">Tania</option>
                </select>
                <label class="text-[10px] font-black text-pink-400 uppercase mb-1 block">A quién le correspondía</label>
                <select id="p-benef" class="w-full p-4 mb-4 bg-amber-50 rounded-xl text-lg outline-none border-none">
                    <option value="AMBOS">A Medias</option><option value="JUAN">Solo Juan</option><option value="TANIA">Solo Tania</option>
                </select>
                <div class="flex gap-2 mb-4">
                    <select id="p-moneda" class="w-[120px] p-4 rounded-xl text-lg outline-none border-none">
                        <option value="REALES">REALES</option><option value="PESOS">PESOS</option>
                    </select>
                    <input type="number" id="p-monto" class="flex-1 p-4 rounded-xl text-lg outline-none border-none" placeholder="0,00" inputmode="decimal">
                </div>
                <input type="text" id="p-detalle" class="w-full p-4 mb-6 rounded-xl text-lg outline-none border-none" placeholder="Detalle (Bidón, Ropa, Helado...)">
                <button onclick="savePareja()" class="w-full bg-pink-600 text-white p-5 rounded-2xl font-black text-xl shadow-[0_6px_0_#9f1239] active:translate-y-1">GUARDAR JyT</button>
            </div>

            <div id="res-pareja-caja" class="p-8 rounded-[3rem] text-center border-4 border-dashed shadow-inner mb-8">
                <div class="flex justify-center items-center gap-2 mb-4 font-bold text-slate-400 uppercase text-xs">
                    TC Real: <input type="number" id="tc-pareja-val" value="8.50" oninput="renderPareja()" class="w-16 p-1 border rounded text-center font-bold text-slate-800">
                </div>
                <p id="pareja-msg" class="text-sm font-black text-slate-500 uppercase tracking-widest mb-1"></p>
                <p id="pareja-final" class="text-5xl font-black"></p>
                <div id="pareja-desglose" class="mt-4 text-[10px] text-slate-400 font-bold uppercase leading-tight"></div>
            </div>

            <div id="lista-pareja" class="space-y-3"></div>
        </div>

    </div>

    <script>
        // CONFIGURACIÓN FIREBASE ORIGINAL
        const firebaseConfig = {
            apiKey: "AIzaSyBDlHjKXf33pCEznyLAmFrTDXVPevrHe9Q",
            authDomain: "gastoscasa-d8bc2.firebaseapp.com",
            databaseURL: "https://gastoscasa-d8bc2-default-rtdb.firebaseio.com",
            projectId: "gastoscasa-d8bc2",
            storageBucket: "gastoscasa-d8bc2.firebasestorage.app",
            messagingSenderId: "749635992986",
            appId: "1:749635992986:web:7916d888f54eb5c3ab0e23"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        
        const NODO_GRUPO = 'viaje_brasil_2026';
        const NODO_PAREJA = 'brasil_2026_interno';

        let GASTOS_G = [];
        let GASTOS_P = [];

        // NAVEGACIÓN
        function changeTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'tab-jyt-active'));
            const btn = document.getElementById('btn-' + id);
            if(id === 'PAREJA') btn.classList.add('tab-jyt-active');
            else btn.classList.add('tab-active');
            
            if(id === 'HISTORIAL') renderHistorial();
            if(id === 'BALANCE') renderBalance();
            if(id === 'PAREJA') renderPareja();
        }

        function checkOtro(v) { document.getElementById('g-otro').classList.toggle('hidden', v !== 'VARIOS'); }

        // LISTENERS
        db.ref(NODO_GRUPO).on('value', snap => {
            const data = snap.val();
            GASTOS_G = data ? Object.entries(data).map(([id, val]) => ({id, ...val})) : [];
            GASTOS_G = GASTOS_G.filter(g => Number(g.monto) !== 100);
            renderHistorial();
            renderBalance();
        });

        db.ref(NODO_PAREJA).on('value', snap => {
            const data = snap.val();
            GASTOS_P = data ? Object.entries(data).map(([id, val]) => ({id, ...val})) : [];
            renderPareja();
        });

        // FUNCIONES DE GUARDADO
        function saveGrupo() {
            const m = document.getElementById('g-monto').value;
            if(!m) return;
            const r = document.getElementById('g-rubro').value;
            const rubroFinal = (r === 'VARIOS' ? "VAR: " + document.getElementById('g-otro').value : r).replace(/Bid.n/gi, "Bidón");
            
            db.ref(NODO_GRUPO).push({
                pagador: document.getElementById('g-pagador').value,
                moneda: document.getElementById('g-moneda').value,
                monto: Number(m),
                rubro: rubroFinal,
                fecha: new Date().toLocaleDateString('es-UY'),
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('g-monto').value = "";
                document.getElementById('g-otro').value = "";
                alert("Guardado en Grupo");
            });
        }

        function savePareja() {
            const m = document.getElementById('p-monto').value;
            if(!m) return;
            const det = (document.getElementById('p-detalle').value || "Gasto J&T").replace(/Bid.n/gi, "Bidón");
            
            db.ref(NODO_PAREJA).push({
                pagador: document.getElementById('p-pagador').value,
                beneficiario: document.getElementById('p-benef').value,
                moneda: document.getElementById('p-moneda').value,
                monto: Number(m),
                detalle: det,
                fecha: new Date().toLocaleDateString('es-UY'),
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('p-monto').value = "";
                document.getElementById('p-detalle').value = "";
                alert("Guardado en JyT");
            });
        }

        // RENDERS DE PANTALLA
        function renderHistorial() {
            const list = document.getElementById('lista-gastos');
            const table = document.getElementById('tabla-resumen');
            if(!list || !table) return;

            const tc = Number(document.getElementById('tc-historial').value) || 1;
            
            const resumen = GASTOS_G.reduce((acc, g) => {
                let r = g.rubro.replace(/Bid.n/gi, "Bidón");
                if (r.toUpperCase().startsWith("VAR:")) r = "VARIOS";
                acc[r] = acc[r] || { R: 0, P: 0 };
                if(g.moneda === 'REALES') acc[r].R += g.monto; else acc[r].P += g.monto;
                return acc;
            }, {});

            table.innerHTML = `
                <table class="w-full text-right">
                    <thead><tr class="text-slate-400 font-black text-[10px] uppercase"><th class="text-left">RUBRO</th><th>R$</th><th>$</th></tr></thead>
                    <tbody>${Object.entries(resumen).sort().map(([r, v]) => `
                        <tr class="border-t border-slate-100"><td class="text-left py-2 font-bold">${r}</td><td>${v.R.toFixed(2)}</td><td>${v.P.toFixed(2)}</td></tr>
                    `).join('')}</tbody>
                </table>
            `;

            list.innerHTML = GASTOS_G.slice().reverse().map(g => `
                <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                    <div><small class="text-slate-400 font-bold uppercase text-[9px]">${g.fecha} • ${g.pagador}</small><p class="font-bold text-slate-800">${g.rubro.replace(/Bid.n/gi, "Bidón")}</p></div>
                    <div class="text-right">
                        <p class="font-black text-slate-900">${g.moneda==='REALES'?'R$':'$'} ${g.monto.toFixed(2)}</p>
                        <button onclick="borrar('${NODO_GRUPO}','${g.id}')" class="text-red-400 text-[9px] font-bold underline">Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        function renderBalance() {
            const mon = document.getElementById('bal-moneda-sel').value;
            const t = { JUAN: 0, TANIA: 0, RICHARD: 0, ROSARIO: 0 };
            GASTOS_G.filter(g => g.moneda === mon).forEach(g => t[g.pagador] += g.monto);
            
            const p1 = t.JUAN + t.TANIA;
            const p2 = t.RICHARD + t.ROSARIO;
            const total = p1 + p2;
            const dif = p1 - (total / 2);

            document.getElementById('sum-p1').innerText = p1.toFixed(2);
            document.getElementById('sum-p2').innerText = p2.toFixed(2);
            document.getElementById('sum-total').innerText = total.toFixed(2);
            
            const caja = document.getElementById('veredicto-caja');
            if(dif > 0) {
                caja.className = "p-6 rounded-3xl border-2 font-black text-lg bg-blue-50 text-blue-800 border-blue-200";
                caja.innerHTML = `P2 DEBE A P1<br><span class="text-3xl">${mon === 'REALES' ? 'R$' : '$'} ${dif.toFixed(2)}</span>`;
            } else {
                caja.className = "p-6 rounded-3xl border-2 font-black text-lg bg-red-50 text-red-800 border-red-200";
                caja.innerHTML = `P1 DEBE A P2<br><span class="text-3xl">${mon === 'REALES' ? 'R$' : '$'} ${Math.abs(dif).toFixed(2)}</span>`;
            }
        }

        function renderPareja() {
            const tc = Number(document.getElementById('tc-pareja-val').value) || 1;
            let jP = 0, tP = 0, int = 0;

            GASTOS_G.forEach(g => {
                const m = g.moneda === 'REALES' ? g.monto * tc : g.monto;
                if(g.pagador === 'JUAN') jP += m; if(g.pagador === 'TANIA') tP += m;
            });
            const difG = jP - ((jP + tP) / 2);

            GASTOS_P.forEach(g => {
                const m = g.moneda === 'REALES' ? g.monto * tc : g.monto;
                if(g.pagador === 'JUAN') {
                    if(g.beneficiario === 'AMBOS') int += (m/2);
                    if(g.beneficiario === 'TANIA') int += m;
                } else {
                    if(g.beneficiario === 'AMBOS') int -= (m/2);
                    if(g.beneficiario === 'JUAN') int -= m;
                }
            });

            const final = difG + int;
            const box = document.getElementById('res-pareja-caja');
            const msg = document.getElementById('pareja-msg');
            const amt = document.getElementById('pareja-final');
            const des = document.getElementById('pareja-desglose');

            if(final > 0) {
                box.className = "p-8 rounded-[3rem] text-center border-4 border-dashed shadow-inner mb-8 bg-blue-50 border-blue-200";
                msg.innerText = "TANIA DEBE A JUAN";
                amt.className = "text-5xl font-black text-blue-600";
                amt.innerText = "$ " + final.toLocaleString('es-UY', {maximumFractionDigits:0});
            } else {
                box.className = "p-8 rounded-[3rem] text-center border-4 border-dashed shadow-inner mb-8 bg-pink-50 border-pink-200";
                msg.innerText = "JUAN DEBE A TANIA";
                amt.className = "text-5xl font-black text-pink-600";
                amt.innerText = "$ " + Math.abs(final).toLocaleString('es-UY', {maximumFractionDigits:0});
            }
            des.innerHTML = `* Por Grupo: $ ${difG.toLocaleString('es-UY', {maximumFractionDigits:0})}<br>* Por Interno: $ ${int.toLocaleString('es-UY', {maximumFractionDigits:0})}`;

            document.getElementById('lista-pareja').innerHTML = GASTOS_P.slice().reverse().map(g => `
                <div class="bg-white p-4 rounded-xl border-l-8 flex justify-between items-center shadow-sm" style="border-color: ${g.pagador==='JUAN'?'#3b82f6':'#ec4899'}">
                    <div>
                        <span class="text-[9px] font-black px-2 py-0.5 rounded text-white ${g.beneficiario==='AMBOS'?'bg-purple-400':(g.beneficiario==='JUAN'?'bg-blue-400':'bg-pink-400')}">${g.beneficiario}</span>
                        <p class="font-bold mt-1 text-slate-800">${g.detalle.replace(/Bid.n/gi, "Bidón")}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-slate-900">${g.moneda === 'REALES' ? 'R$' : '$'} ${g.monto.toFixed(2)}</p>
                        <button onclick="borrar('${NODO_PAREJA}','${g.id}')" class="text-red-300 text-[9px] font-bold underline">Borrar</button>
                    </div>
                </div>
            `).join('');
        }

        function borrar(n, id) { if(confirm("¿Eliminar gasto?")) db.ref(n + '/' + id).remove(); }

        // ==========================================
        // EXCEL EXPORT - MATEMÁTICA CORREGIDA (DEUDA = DIFERENCIA / 2)
        // ==========================================
        function exportarExcelTotal() {
            if(GASTOS_G.length === 0) return alert("No hay datos para exportar");
            
            const cleanText = (txt) => txt.replace(/Bid.n/gi, "Bidon");
            const f = (n) => Number(n).toFixed(2).replace('.', ',');

            const sortFn = (a, b) => a.rubro.localeCompare(b.rubro) || a.timestamp - b.timestamp;
            const reales = GASTOS_G.filter(g => g.moneda === 'REALES').sort(sortFn);
            const pesos = GASTOS_G.filter(g => g.moneda === 'PESOS').sort(sortFn);
            
            let csv = "\ufeffRENDICION BRASIL 2026;;PAREJA 1;;PAREJA 2;\n";
            
            // --- REALES ---
            csv += "GASTOS EN REALES;;JUAN;TANIA;RICHARD;ROSARIO\n";
            let sumRJ = 0, sumRT = 0, sumRRi = 0, sumRRo = 0;
            reales.forEach(g => {
                if(g.pagador==='JUAN') sumRJ += g.monto; if(g.pagador==='TANIA') sumRT += g.monto;
                if(g.pagador==='RICHARD') sumRRi += g.monto; if(g.pagador==='ROSARIO') sumRRo += g.monto;
                csv += `${cleanText(g.rubro)};${g.fecha};${g.pagador==='JUAN'?f(g.monto):'0,00'};${g.pagador==='TANIA'?f(g.monto):'0,00'};${g.pagador==='RICHARD'?f(g.monto):'0,00'};${g.pagador==='ROSARIO'?f(g.monto):'0,00'}\n`;
            });
            csv += `SUMAS REALES;;${f(sumRJ)};${f(sumRT)};${f(sumRRi)};${f(sumRRo)}\n\n`;

            // --- PESOS ---
            csv += "GASTOS EN PESOS;;JUAN;TANIA;RICHARD;ROSARIO\n";
            let sumPJ = 0, sumPT = 0, sumPRi = 0, sumPRo = 0;
            pesos.forEach(g => {
                if(g.pagador==='JUAN') sumPJ += g.monto; if(g.pagador==='TANIA') sumPT += g.monto;
                if(g.pagador==='RICHARD') sumPRi += g.monto; if(g.pagador==='ROSARIO') sumPRo += g.monto;
                csv += `${cleanText(g.rubro)};${g.fecha};${g.pagador==='JUAN'?f(g.monto):'0,00'};${g.pagador==='TANIA'?f(g.monto):'0,00'};${g.pagador==='RICHARD'?f(g.monto):'0,00'};${g.pagador==='ROSARIO'?f(g.monto):'0,00'}\n`;
            });
            csv += `SUMAS PESOS;;${f(sumPJ)};${f(sumPT)};${f(sumPRi)};${f(sumPRo)}\n\n`;

            // --- TOTALES Y MATEMÁTICA ---
            const tc = Number(document.getElementById('tc-historial').value) || 1;
            
            const totP1 = ((sumRJ + sumRT) * tc) + (sumPJ + sumPT);
            const totP2 = ((sumRRi + sumRRo) * tc) + (sumPRi + sumPRo);
            
            // LA MAGIA ESTÁ ACÁ: Para saber la DEUDA, se resta lo que pagó cada uno y se DIVIDE ENTRE 2.
            const deudaFinal = (totP1 - totP2) / 2;

            csv += "TOTALES POR PERSONA;;JUAN;TANIA;RICHARD;ROSARIO\n";
            csv += `TOTAL REALES;;${f(sumRJ)};${f(sumRT)};${f(sumRRi)};${f(sumRRo)}\n`;
            csv += `TOTAL PESOS;;${f(sumPJ)};${f(sumPT)};${f(sumPRi)};${f(sumPRo)}\n`;
            csv += `TC REAL USADO PARA CÁLCULO:;;${f(tc)};;;\n`;
            csv += `TOTAL FINAL PAREJAS EN PESOS ($);;P1 (J+T):;${f(totP1)};P2 (R+R):;${f(totP2)}\n\n`;
            
            csv += `DEUDA FINAL ENTRE PAREJAS;;${f(deudaFinal)};;;\n`;
            csv += `(Si es positivo P2 debe a P1. Si es negativo P1 debe a P2);;;;;\n`;

            // DESCARGA
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Rendicion_Brasil_2026.csv`;
            link.click();
        }

        // INIT
        changeTab('GASTOS');
    </script>
</body>
</html>
